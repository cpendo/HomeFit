# Render Blueprint — defines the HomeFit backend web service
# Deploy via https://dashboard.render.com → New → Blueprint → connect this repo
services:
  - type: web
    name: homefit-backend
    runtime: node
    plan: free
    rootDir: backend
    # Build sqlite3 from source so the native binary matches Render's glibc
    buildCommand: npm install --build-from-source=sqlite3
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_DIALECT
        value: sqlite
      - key: DEMO_MODE
        value: "true"
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      # Set FRONTEND_URL manually after Vercel deploy to enable CORS
      - key: FRONTEND_URL
        sync: false
